<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Infinity Training Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.7/main.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f6f7fb;
      color: #1B3A6B;
      transition: all 0.3s ease;
    }

    header {
      padding: 1rem;
      text-align: center;
      /* changed from blue to green for visual verification */
      background-color: #4CAF50;
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
    }

    #calendar {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 1rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .fc-event-CorporateRecurring { background-color: #D5F0E3; color: #1B3A6B; }
    .fc-event-CorporateSpecialty { background-color: #FFE8E8; color: #1B3A6B; }
    .fc-event-Team { background-color: #D6E4F7; color: #1B3A6B; }

    /* Dark Mode */
    body.dark {
      background-color: #1B1B1B;
      color: #f6f7fb;
    }

    body.dark header { /* dark-mode variant for green banner */
      background-color: #2e7d32;
    }
    body.dark #calendar { background-color: #1B1B1B; color: #f6f7fb; box-shadow: 0 4px 10px rgba(255,255,255,0.1); }

    button#toggleDark {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      background: #24406F;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>Team Infinity Training Calendar</header>
  <button id="toggleDark">Toggle Dark Mode</button>
  <div id="calendar"></div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.7/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    // Link to your MASTER tab CSV
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbKBzguAH_H_n78lMb5NZhgEyqVvxRV3T-oYQV7T98A-1rUOtvU9OzlHKYcIQSpV6XdBvREEJaicME/pub?gid=525320229&single=true&output=csv";

    async function fetchEvents() {
      try {
        const res = await fetch(sheetURL);
        const csvText = await res.text();
        const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });

        const events = parsed.data.map(raw => {
          // normalize keys so we can handle either Title/Date or title/date etc.
          const row = {};
          for (const k in raw) {
            if (!k) continue;
            row[k.trim().toLowerCase()] = raw[k].trim();
          }

          if (!row.date || !row.time) return null;

          // Parse date and time as EST (change or remove timezone as needed)
          const eventDate = new Date(row.date + " " + row.time + " EST");
          if (isNaN(eventDate)) return null;

          // Use Category column if exists, otherwise default to Team
          const category = row.category || "Team";

          return {
            title: row.title || "", // allow blank title if missing
            start: eventDate.toISOString(),
            extendedProps: {
              trainer: row.trainer || "",
              url: row.url || "",
              category: category
            },
            className: "fc-event-" + category.replace(/\s+/g, '')
          };
        }).filter(e => e !== null);
        return events;
      } catch (err) {
        console.error('Error fetching or parsing sheet data', err);
        return [];
      }
    }

    async function initCalendar() {
      const events = await fetchEvents();

      if (events.length === 0) {
        console.warn('No events returned from sheet; check headers and console for errors.');
      }

      const calendarEl = document.getElementById("calendar");
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        timeZone: 'local',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: events,
        eventClick: function(info) {
          const trainer = info.event.extendedProps.trainer;
          const url = info.event.extendedProps.url;
          if(url) window.open(url, "_blank");
          alert(`${info.event.title}\nTrainer: ${trainer}\nLink: ${url || "No link provided"}`);
        },
        eventDidMount: function(info) {
          info.el.setAttribute('title', `${info.event.title}\nTrainer: ${info.event.extendedProps.trainer}\nLink: ${info.event.extendedProps.url}`);
        }
      });

      calendar.render();

      if (events.length === 0) {
        // show a small note inside the calendar area when it's empty
        const notice = document.createElement('div');
        notice.style.textAlign = 'center';
        notice.style.color = '#666';
        notice.style.marginTop = '1rem';
        notice.textContent = 'No events found – open the console for details.';
        calendarEl.appendChild(notice);
      }
    }

    document.getElementById('toggleDark').addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });

    initCalendar();
  </script>
</body>
</html>
