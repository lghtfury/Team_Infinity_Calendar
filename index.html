<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Team Infinity Training Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.7/main.min.css" rel="stylesheet">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f6f7fb;
      color: #1B3A6B;
      transition: all 0.3s ease;
    }

    header {
      padding: 1rem;
      text-align: center;
      background-color: #24406F;
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
    }

    #calendar {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 1rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Event colors for categories */
    .fc-event-corporateRecurring { background-color: #D5F0E3; color: #1B3A6B; }
    .fc-event-corporateSpecialty { background-color: #FFE8E8; color: #1B3A6B; }
    .fc-event-team { background-color: #D6E4F7; color: #1B3A6B; }

    /* Dark Mode */
    body.dark {
      background-color: #1B1B1B;
      color: #f6f7fb;
    }

    body.dark header { background-color: #0d1a33; }
    body.dark #calendar { background-color: #1B1B1B; color: #f6f7fb; box-shadow: 0 4px 10px rgba(255,255,255,0.1); }

    button#toggleDark {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      background: #24406F;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>Team Infinity Training Calendar</header>
  <button id="toggleDark">Toggle Dark Mode</button>
  <div id="calendar"></div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.7/main.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbKBzguAH_H_n78lMb5NZhgEyqVvxRV3T-oYQV7T98A-1rUOtvU9OzlHKYcIQSpV6XdBvREEJaicME/pub?output=csv";

    // Merge the tabs into a single array
    async function fetchEvents() {
      const res = await fetch(sheetURL);
      const csvText = await res.text();

      // Parse CSV
      const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
      return parsed.data.map(row => {
        // Determine category based on tab info (you can add a column in sheet for category or detect from title if needed)
        let category = "Team";
        if(row.weekday) category = "Corporate Recurring";
        if(row.frequency.toLowerCase().includes("recurring") && row.weekday === undefined) category = "Corporate Specialty";

        // Parse date & time
        let eventDate = row.date ? new Date(row.date + " " + row.time + " EST") : null;

        return {
          title: row.title,
          start: eventDate ? eventDate.toISOString() : null,
          extendedProps: {
            trainer: row.trainer,
            url: row.url,
            category: category
          },
          className: "fc-event-" + category.replace(/\s+/g, '')
        };
      }).filter(e => e.start !== null);
    }

    // Initialize calendar
    async function initCalendar() {
      const events = await fetchEvents();

      const calendarEl = document.getElementById("calendar");
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        timeZone: 'local',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: events,
        eventClick: function(info) {
          const trainer = info.event.extendedProps.trainer;
          const url = info.event.extendedProps.url;
          alert(`${info.event.title}\nTrainer: ${trainer}\nLink: ${url}`);
        },
        eventDidMount: function(info) {
          info.el.setAttribute('title', `${info.event.title}\nTrainer: ${info.event.extendedProps.trainer}\nLink: ${info.event.extendedProps.url}`);
        }
      });

      calendar.render();
    }

    // Dark mode toggle
    document.getElementById('toggleDark').addEventListener('click', () => {
      document.body.classList.toggle('dark');
    });

    initCalendar();
  </script>
</body>
</html>
