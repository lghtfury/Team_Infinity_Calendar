<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Infinity Training Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background-color: #f6f7fb;
      color: #1B3A6B;
      transition: background-color 0.3s, color 0.3s;
    }
    header {
      padding: 1rem;
      text-align: center;
      background-color: #1B3A6B;
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
    }
    #calendar {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 1rem;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    #loading {
      text-align: center;
      padding: 2rem;
      font-size: 1.1rem;
      color: #666;
    }
    #error-msg {
      display: none;
      text-align: center;
      padding: 1rem;
      color: red;
      font-weight: bold;
    }

    /* Event colors by category */
    .fc-event-CorporateRecurring { background-color: #4CAF50 !important; border-color: #388E3C !important; color: white !important; }
    .fc-event-CorporateSpecialty { background-color: #E53935 !important; border-color: #B71C1C !important; color: white !important; }
    .fc-event-Team               { background-color: #1976D2 !important; border-color: #0D47A1 !important; color: white !important; }

    /* Dark Mode */
    body.dark { background-color: #121212; color: #f6f7fb; }
    body.dark header { background-color: #0d1f3c; }
    body.dark #calendar { background-color: #1e1e1e; box-shadow: 0 4px 10px rgba(255,255,255,0.05); }
    body.dark .fc { color: #f6f7fb; }
    body.dark .fc-col-header-cell,
    body.dark .fc-daygrid-day { border-color: #333 !important; }
    body.dark .fc-toolbar-title { color: #f6f7fb; }
    body.dark .fc-button { background-color: #333 !important; border-color: #555 !important; color: #fff !important; }
    body.dark .fc-day-today { background-color: #2a2a2a !important; }

    #toggleDark {
      position: fixed;
      top: 12px; right: 12px;
      padding: 0.5rem 1rem;
      border: none; border-radius: 5px;
      background: #24406F; color: white;
      cursor: pointer; font-size: 0.9rem;
      z-index: 999;
    }
    #toggleDark:hover { background: #1a2f52; }

    #legend {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 0.5rem auto 0;
      max-width: 1100px;
      padding: 0 1rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.85rem; }
    .legend-dot { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
  </style>
</head>
<body>
  <header>Team Infinity Training Calendar</header>
  <button id="toggleDark">🌙 Dark Mode</button>

  <div id="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#4CAF50"></span> Corporate Recurring</div>
    <div class="legend-item"><span class="legend-dot" style="background:#E53935"></span> Corporate Specialty</div>
    <div class="legend-item"><span class="legend-dot" style="background:#1976D2"></span> Team</div>
  </div>

  <div id="calendar">
    <div id="loading">⏳ Loading events...</div>
    <div id="error-msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>

    const MASTER_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQbKBzguAH_H_n78lMb5NZhgEyqVvxRV3T-oYQV7T98A-1rUOtvU9OzlHKYcIQSpV6XdBvREEJaicME/pub?gid=525320229&single=true&output=csv";

    function parseTime(str) {
      const m = str.match(/(\d+):(\d+)\s*(AM|PM)?/i);
      if (!m) return null;
      let h = parseInt(m[1]), min = parseInt(m[2]);
      const mer = (m[3] || '').toUpperCase();
      if (mer === 'PM' && h !== 12) h += 12;
      if (mer === 'AM' && h === 12) h = 0;
      return { hours: h, minutes: min };
    }

    function parseDate(dateStr) {
      // Handle YYYY-MM-DD (how Google Sheets exports dates)
      const iso = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (iso) return new Date(parseInt(iso[1]), parseInt(iso[2]) - 1, parseInt(iso[3]));
      // Handle M/D/YYYY
      const mdy = dateStr.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (mdy) return new Date(parseInt(mdy[3]), parseInt(mdy[1]) - 1, parseInt(mdy[2]));
      return null;
    }

    function normalizeRow(raw) {
      const row = {};
      for (const k in raw) {
        if (k) row[k.trim().toLowerCase()] = (raw[k] || '').trim();
      }
      return row;
    }

    // Map category text to CSS class name
    function categoryClass(cat) {
      const c = cat.toLowerCase();
      if (c.includes('recurring')) return 'CorporateRecurring';
      if (c.includes('specialty')) return 'CorporateSpecialty';
      if (c.includes('team'))      return 'Team';
      return 'Team'; // default
    }

    async function fetchEvents() {
      const res = await fetch(MASTER_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const csv = await res.text();
      const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true });

      const events = [];
      parsed.data.forEach((raw, i) => {
        const row = normalizeRow(raw);
        if (!row.title || !row.date) return;

        const date = parseDate(row.date);
        if (!date) {
          console.warn(`Row ${i + 2}: could not parse date "${row.date}" — skipped`);
          return;
        }

        const timeObj = row.time ? parseTime(row.time) : null;
        if (timeObj) date.setHours(timeObj.hours, timeObj.minutes, 0, 0);

        const cat = row.category || 'Team';
        events.push({
          title: row.title,
          start: date.toISOString(),
          allDay: !timeObj,
          className: `fc-event-${categoryClass(cat)}`,
          extendedProps: {
            trainer:  row.trainer || '',
            url:      row.url     || '',
            category: cat
          }
        });
      });

      return events;
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('error-msg');
      el.style.display = 'block';
      el.textContent = msg;
    }

    async function initCalendar() {
      let events = [];
      try {
        events = await fetchEvents();
        console.log(`Loaded ${events.length} events`);
      } catch (err) {
        console.error(err);
        showError(`⚠️ Could not load events: ${err.message}`);
        return;
      }

      document.getElementById('loading').remove();

      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        timeZone: 'local',
        height: 'auto',
        headerToolbar: {
          left:   'prev,next today',
          center: 'title',
          right:  'dayGridMonth,timeGridWeek,listMonth'
        },
        events,
        eventClick(info) {
          info.jsEvent.preventDefault();
          const { trainer, url, category } = info.event.extendedProps;
          const msg = [
            `📅 ${info.event.title}`,
            category ? `Category: ${category}` : '',
            trainer  ? `Trainer: ${trainer}`   : '',
            url      ? `Link: ${url}`          : 'No link provided'
          ].filter(Boolean).join('\n');
          alert(msg);
          if (url) window.open(url, '_blank');
        },
        eventDidMount(info) {
          const { trainer, url } = info.event.extendedProps;
          info.el.title = [
            info.event.title,
            trainer ? `Trainer: ${trainer}` : '',
            url || ''
          ].filter(Boolean).join('\n');
        },
        noEventsContent: 'No events found — check your sheet is published as CSV.'
      });

      calendar.render();
    }

    document.getElementById('toggleDark').addEventListener('click', () => {
      document.body.classList.toggle('dark');
      document.getElementById('toggleDark').textContent =
        document.body.classList.contains('dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
    });

    initCalendar();
  </script>
</body>
</html>
